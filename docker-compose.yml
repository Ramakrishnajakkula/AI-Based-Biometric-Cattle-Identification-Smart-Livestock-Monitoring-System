version: "3.8"

services:
  # MongoDB Database
  mongodb:
    image: mongo:7
    container_name: cattle-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  # Mosquitto MQTT Broker
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: cattle-mosquitto
    ports:
      - "1883:1883" # MQTT TCP
      - "9001:9001" # MQTT WebSocket (for frontend)
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    restart: unless-stopped

volumes:
  mongodb_data:
  mosquitto_data:
  mosquitto_log:
